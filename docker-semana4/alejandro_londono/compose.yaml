version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: proyecto
    ports:
      - "5432:5432"
    # 1. Asignamos el volumen para no perder los datos
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 2. Conectamos a la red
    networks:
      - micro-net

  api:
    build: .
    container_name: proyecto-container
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: proyecto
      DB_PORT: 5432
    depends_on:
      - db
    # 2. Conectamos a la misma red
    networks:
      - micro-net

# Declaración de red
networks:
  micro-net:

# Declaración de volumen
volumes:
  pgdata: